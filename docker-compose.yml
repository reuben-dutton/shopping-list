services:
  shopping-list:
    build: .
    volumes:
      - ./recipes:/app/recipes:ro
    restart: unless-stopped
    environment:
      - ROOT_PATH=/shopping
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - caddy

networks:
  caddy:
    external: true